---
################################################################################
# NextOpus - Hardening Role
# Security hardening for Ubuntu 24.04 nodes
################################################################################

# ==============================================================================
# SSH Hardening
# ==============================================================================

- name: Configure SSH daemon
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: 'sshd -t -f %s'
  loop:
    - { regexp: '^#?Port ', line: 'Port {{ ssh_port }}' }
    - { regexp: '^#?PermitRootLogin ', line: 'PermitRootLogin {{ ssh_permit_root_login }}' }
    - { regexp: '^#?PasswordAuthentication ', line: 'PasswordAuthentication {{ ssh_password_authentication }}' }
    - { regexp: '^#?PubkeyAuthentication ', line: 'PubkeyAuthentication yes' }
    - { regexp: '^#?X11Forwarding ', line: 'X11Forwarding no' }
    - { regexp: '^#?MaxAuthTries ', line: 'MaxAuthTries 3' }
    - { regexp: '^#?ClientAliveInterval ', line: 'ClientAliveInterval 300' }
    - { regexp: '^#?ClientAliveCountMax ', line: 'ClientAliveCountMax 2' }
    - { regexp: '^#?AllowAgentForwarding ', line: 'AllowAgentForwarding no' }
    - { regexp: '^#?AllowTcpForwarding ', line: 'AllowTcpForwarding no' }
    - { regexp: '^#?PermitEmptyPasswords ', line: 'PermitEmptyPasswords no' }
  notify: Restart sshd

# ==============================================================================
# UFW Firewall Configuration
# ==============================================================================

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: "{{ ufw_default_incoming }}" }
    - { direction: outgoing, policy: "{{ ufw_default_outgoing }}" }

- name: Allow specified ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ firewall_allowed_ports }}"

- name: Allow all traffic from cluster nodes
  community.general.ufw:
    rule: allow
    src: "{{ hostvars[item]['private_ip'] }}"
    comment: "Cluster node {{ item }}"
  loop: "{{ groups['k3s_cluster'] }}"

- name: Allow Kubernetes pod network
  community.general.ufw:
    rule: allow
    src: "{{ cluster_cidr }}"
    comment: "Kubernetes Pod Network"

- name: Allow Kubernetes service network
  community.general.ufw:
    rule: allow
    src: "{{ service_cidr }}"
    comment: "Kubernetes Service Network"

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ufw_enabled

# ==============================================================================
# Fail2Ban Configuration
# ==============================================================================

- name: Configure fail2ban for SSH
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled = true
      port = {{ ssh_port }}
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 3600
    mode: '0644'
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: yes
    state: started

# ==============================================================================
# System Hardening
# ==============================================================================

- name: Set secure permissions on sensitive files
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/shadow, mode: '0640' }
    - { path: /etc/gshadow, mode: '0640' }
    - { path: /etc/passwd, mode: '0644' }
    - { path: /etc/group, mode: '0644' }
  ignore_errors: yes

- name: Disable core dumps
  ansible.posix.sysctl:
    name: fs.suid_dumpable
    value: '0'
    sysctl_file: /etc/sysctl.d/99-security.conf
    reload: yes

- name: Configure secure kernel parameters
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-security.conf
    reload: yes
  loop:
    - { name: "kernel.randomize_va_space", value: "2" }
    - { name: "kernel.kptr_restrict", value: "2" }
    - { name: "kernel.dmesg_restrict", value: "1" }
    - { name: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { name: "net.ipv4.conf.default.rp_filter", value: "1" }
    - { name: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
    - { name: "net.ipv4.conf.all.accept_source_route", value: "0" }
    - { name: "net.ipv4.conf.default.accept_source_route", value: "0" }
    - { name: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.send_redirects", value: "0" }
    - { name: "net.ipv4.tcp_syncookies", value: "1" }
    - { name: "net.ipv4.tcp_max_syn_backlog", value: "2048" }
    - { name: "net.ipv4.tcp_synack_retries", value: "2" }

- name: Remove unnecessary packages
  ansible.builtin.apt:
    name:
      - telnet
      - rsh-client
      - rsh-redone-client
    state: absent
    purge: yes
  ignore_errors: yes

# ==============================================================================
# Automatic Security Updates
# ==============================================================================

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Configure unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: '0644'
