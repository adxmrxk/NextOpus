---
################################################################################
# NextOpus - K3s Server Role
# Install and configure K3s control plane
################################################################################

- name: Check if K3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Get K3s installed version
  ansible.builtin.command: k3s --version
  register: k3s_installed_version
  changed_when: false
  failed_when: false
  when: k3s_binary.stat.exists

- name: Download K3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists or k3s_version not in (k3s_installed_version.stdout | default(''))

- name: Install K3s server
  ansible.builtin.shell: |
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    INSTALL_K3S_EXEC="server {{ k3s_server_args }}" \
    /tmp/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_SKIP_SELINUX_RPM: "true"
  register: k3s_server_install
  notify: Restart k3s

- name: Wait for K3s to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_nodes
  until: k3s_nodes.rc == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Wait for node to be Ready
  ansible.builtin.shell: |
    k3s kubectl get nodes {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  until: node_ready.stdout == "True"
  retries: 30
  delay: 10
  changed_when: false

- name: Read K3s token
  ansible.builtin.slurp:
    src: "{{ k3s_token_path }}"
  register: k3s_token_raw

- name: Set K3s token fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Read kubeconfig
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Create local kubeconfig directory
  ansible.builtin.file:
    path: "{{ kubeconfig_local_path | dirname }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: no

- name: Save kubeconfig locally
  ansible.builtin.copy:
    content: "{{ kubeconfig_raw.content | b64decode | replace('127.0.0.1', ansible_host) | replace('default', 'nextopus') }}"
    dest: "{{ kubeconfig_local_path }}"
    mode: '0600'
  delegate_to: localhost
  become: no

- name: Label control plane node
  ansible.builtin.command: >
    k3s kubectl label node {{ inventory_hostname }}
    node-role.kubernetes.io/control-plane=true
    --overwrite
  changed_when: false

- name: Remove worker label from control plane
  ansible.builtin.command: >
    k3s kubectl label node {{ inventory_hostname }}
    node-role.kubernetes.io/worker-
  changed_when: false
  failed_when: false

# ==============================================================================
# Deploy Essential Cluster Components
# ==============================================================================

- name: Create manifests directory
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    mode: '0755'

- name: Deploy MetalLB for LoadBalancer services
  ansible.builtin.template:
    src: metallb.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/metallb.yaml
    mode: '0644'

- name: Wait for all system pods to be ready
  ansible.builtin.shell: |
    k3s kubectl wait --for=condition=Ready pods --all -n kube-system --timeout=300s
  changed_when: false
  retries: 3
  delay: 30
