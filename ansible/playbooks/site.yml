---
################################################################################
# NextOpus - Main Site Playbook
# Complete cluster deployment: hardening + K3s installation
################################################################################

- name: Apply common configuration to all nodes
  hosts: k3s_cluster
  become: yes
  gather_facts: yes
  roles:
    - common
  tags:
    - common
    - always

- name: Apply security hardening to all nodes
  hosts: k3s_cluster
  become: yes
  gather_facts: no
  roles:
    - hardening
  tags:
    - hardening
    - security

- name: Install K3s control plane
  hosts: control_plane
  become: yes
  gather_facts: no
  serial: 1
  roles:
    - k3s-server
  tags:
    - k3s
    - control-plane

- name: Install K3s agents on worker nodes
  hosts: workers
  become: yes
  gather_facts: no
  roles:
    - k3s-agent
  tags:
    - k3s
    - workers

- name: Verify cluster health
  hosts: control_plane
  become: yes
  gather_facts: no
  tasks:
    - name: Get cluster nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Display cluster nodes
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"

    - name: Get all pods
      ansible.builtin.command: k3s kubectl get pods -A
      register: cluster_pods
      changed_when: false

    - name: Display cluster pods
      ansible.builtin.debug:
        msg: "{{ cluster_pods.stdout_lines }}"

    - name: Cluster deployment summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          NextOpus K3s Cluster Deployed Successfully!
          ============================================================

          Kubeconfig saved to: {{ kubeconfig_local_path }}

          To use the cluster:
            export KUBECONFIG={{ kubeconfig_local_path }}
            kubectl get nodes

          Control Plane: {{ ansible_host }}
          API Endpoint: https://{{ ansible_host }}:6443

          ============================================================
  tags:
    - verify
    - always
