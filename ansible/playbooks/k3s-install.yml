---
################################################################################
# NextOpus - K3s Installation Only Playbook
# Use this if nodes are already hardened
################################################################################

- name: Apply common configuration to all nodes
  hosts: k3s_cluster
  become: yes
  gather_facts: yes
  roles:
    - common

- name: Install K3s control plane
  hosts: control_plane
  become: yes
  gather_facts: no
  serial: 1
  roles:
    - k3s-server

- name: Install K3s agents on worker nodes
  hosts: workers
  become: yes
  gather_facts: no
  roles:
    - k3s-agent

- name: Verify cluster deployment
  hosts: control_plane
  become: yes
  gather_facts: no
  tasks:
    - name: Get cluster nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
