---
apiVersion: v1
kind: Namespace
metadata:
  name: nextopus-system
  labels:
    app.kubernetes.io/name: nextopus-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardian
  namespace: nextopus-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: guardian
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes"]
    verbs: ["get", "list", "watch", "delete", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: guardian
subjects:
  - kind: ServiceAccount
    name: guardian
    namespace: nextopus-system
roleRef:
  kind: ClusterRole
  name: guardian
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian
  namespace: nextopus-system
  labels:
    app: guardian
    app.kubernetes.io/name: guardian
    app.kubernetes.io/component: self-healing
    app.kubernetes.io/part-of: nextopus-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardian
  template:
    metadata:
      labels:
        app: guardian
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: guardian
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: guardian
          image: ghcr.io/nextopus/guardian:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-kube-prometheus-prometheus.observability:9090"
            - name: WATCH_NAMESPACE
              value: "nextopus"
            - name: CHECK_INTERVAL
              value: "30"
            - name: DRY_RUN
              value: "false"
            - name: CPU_SCALE_UP_THRESHOLD
              value: "0.8"
            - name: MEMORY_SCALE_UP_THRESHOLD
              value: "0.85"
            - name: RESTART_COUNT_THRESHOLD
              value: "3"
            - name: ACTION_COOLDOWN
              value: "300"
            - name: SCALE_COOLDOWN
              value: "600"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: guardian
  namespace: nextopus-system
  labels:
    app: guardian
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: guardian
