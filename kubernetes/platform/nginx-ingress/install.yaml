---
# Nginx Ingress Controller for K3s
# Production-grade ingress with rate limiting, SSL, and more
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: ingress-nginx
  namespace: kube-system
spec:
  repo: https://kubernetes.github.io/ingress-nginx
  chart: ingress-nginx
  version: "4.9.1"
  targetNamespace: ingress-nginx
  valuesContent: |-
    controller:
      # Single replica for free tier
      replicaCount: 1

      # ARM-compatible image
      image:
        digest: ""

      # Resource limits for free tier
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # Enable Prometheus metrics
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: observability

      # Use LoadBalancer (MetalLB will assign IP)
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local

      # Enable access logs
      config:
        # Rate limiting defaults
        limit-req-status-code: "429"
        limit-conn-status-code: "429"

        # Security headers
        add-headers: "ingress-nginx/custom-headers"

        # Logging
        log-format-upstream: '$remote_addr - $request_id [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $request_length $request_time [$proxy_upstream_name] $upstream_response_length $upstream_response_time $upstream_status'

        # Timeouts
        proxy-connect-timeout: "10"
        proxy-read-timeout: "60"
        proxy-send-timeout: "60"

        # Buffer sizes
        proxy-buffer-size: "8k"
        proxy-buffers-number: "4"

        # Enable gzip
        use-gzip: "true"
        gzip-level: "6"
        gzip-types: "application/json application/javascript text/css text/plain"

        # SSL settings (when certs are added)
        ssl-protocols: "TLSv1.2 TLSv1.3"
        ssl-prefer-server-ciphers: "true"

        # Hide server version
        server-tokens: "false"

      # Pod anti-affinity for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ingress-nginx
                topologyKey: kubernetes.io/hostname

      # Admission webhooks
      admissionWebhooks:
        enabled: true

    # Default backend
    defaultBackend:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 20Mi
        limits:
          cpu: 50m
          memory: 64Mi
---
# Custom security headers
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: ingress-nginx
data:
  X-Frame-Options: "SAMEORIGIN"
  X-Content-Type-Options: "nosniff"
  X-XSS-Protection: "1; mode=block"
  Referrer-Policy: "strict-origin-when-cross-origin"
  Permissions-Policy: "geolocation=(), microphone=(), camera=()"
