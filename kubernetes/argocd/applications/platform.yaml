---
# Platform components (Vault, Istio, Kyverno, Jaeger)
# Deploy with lower sync-wave to ensure they're ready before apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: nextopus
  source:
    repoURL: https://github.com/YOUR_USERNAME/nextopus.git
    targetRevision: main
    path: kubernetes/platform/vault
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
