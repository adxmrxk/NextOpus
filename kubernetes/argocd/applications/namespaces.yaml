---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextopus-namespaces
  namespace: argocd
spec:
  project: nextopus
  source:
    repoURL: https://github.com/YOUR_USERNAME/nextopus.git
    targetRevision: main
    path: kubernetes/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
