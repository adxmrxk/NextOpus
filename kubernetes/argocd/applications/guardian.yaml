---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guardian
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: nextopus
  source:
    repoURL: https://github.com/YOUR_USERNAME/nextopus.git
    targetRevision: main
    path: kubernetes/apps/guardian
  destination:
    server: https://kubernetes.default.svc
    namespace: nextopus-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
